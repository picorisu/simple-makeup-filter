<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: -apple-system, sans-serif; width: 260px; padding: 12px; margin: 0; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  h2 { font-size: 11px; margin: 14px 0 2px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  label { display: block; font-size: 12px; margin-top: 8px; color: #444; }
  input[type=range] { width: 100%; }
  .row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .row label { margin: 0; flex: 1; }
  .row input[type=range] { flex: 2; }
  .row input[type=color] { width: 28px; height: 22px; padding: 0; border: none; }
  .toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-top: 4px; }
  .note { font-size: 10px; color: #999; margin-top: 12px; }
</style>
</head>
<body>
  <h1>Meet Beauty Filter</h1>
  <div class="toggle">
    <input type="checkbox" id="enabled"><label for="enabled" style="margin:0">有効</label>
  </div>

  <h2>肌</h2>
  <label>美肌 <input type="range" id="smooth" min="0" max="1" step="0.05"></label>
  <label>明るさ <input type="range" id="bright" min="0" max="0.3" step="0.01"></label>
  <label>血色 <input type="range" id="warmth" min="0" max="0.2" step="0.01"></label>
  <label>彩度 <input type="range" id="sat" min="0.5" max="1.5" step="0.05"></label>
  <label>ほうれい線消し（0で無効・1超は強力モード） <input type="range" id="nasoA" min="0" max="2" step="0.05"></label>
  <label>目の下の線消し（0で無効・1超は強力モード） <input type="range" id="eyebagLine" min="0" max="2" step="0.05"></label>
  <label>クマの明るさ持ち上げ（0で無効） <input type="range" id="eyebagBright" min="0" max="1" step="0.05"></label>

  <h2>キャリブレーション（人・環境に合わせる）</h2>
  <label>唇除外のしきい値（広く除外 ⇔ 狭く） <input type="range" id="lipThresh" min="0.52" max="0.65" step="0.005"></label>
  <label>肌色判定の広さ（狭い ⇔ 広い） <input type="range" id="skinRange" min="0.6" max="1.6" step="0.05"></label>

  <h2>メイク（0で無効）</h2>
  <div class="row">
    <label>リップ</label>
    <input type="range" id="lipA" min="0" max="1" step="0.05">
    <input type="color" id="lipColor">
  </div>
  <div class="row">
    <label>チーク</label>
    <input type="range" id="blushA" min="0" max="1" step="0.05">
    <input type="color" id="blushColor">
  </div>
  <label>チーク形状（丸 ⇔ 横長） <input type="range" id="blushShape" min="1" max="2.5" step="0.1"></label>
  <label>チーク位置（下 ⇔ 上） <input type="range" id="blushY" min="-0.08" max="0.2" step="0.01"></label>
  <label>チークぼかし（標準 ⇔ 広くふんわり） <input type="range" id="blushSoft" min="1" max="2.2" step="0.05"></label>
  <div class="row">
    <label>眉</label>
    <input type="range" id="browA" min="0" max="1" step="0.05">
    <input type="color" id="browColor">
  </div>
  <label>眉の太さ（細 ⇔ 太） <input type="range" id="browW" min="0.25" max="1.05" step="0.05"></label>
  <div class="row">
    <label>アイシャドウ</label>
    <input type="range" id="shadowA" min="0" max="1" step="0.05">
  </div>
  <div class="row">
    <label>色（際・中間・上）</label>
    <input type="color" id="shadowColor">
    <input type="checkbox" id="shadowUse2" title="中間色を使う"><input type="color" id="shadowColor2">
    <input type="checkbox" id="shadowUse3" title="上色を使う"><input type="color" id="shadowColor3">
  </div>
  <label>シャドウ高さ（低 ⇔ 高） <input type="range" id="shadowH" min="0.5" max="2" step="0.05"></label>
  <label>シャドウ幅（狭 ⇔ 広） <input type="range" id="shadowW" min="0.8" max="1.4" step="0.05"></label>
  <label>シャドウぼかし（くっきり ⇔ ふんわり） <input type="range" id="shadowSoft" min="0.5" max="3" step="0.1"></label>
  <label>際色の量（均等 ⇔ 際多め） <input type="range" id="shadowBias" min="1" max="3" step="0.1"></label>
  <div class="row">
    <label>アイライン</label>
    <input type="range" id="linerA" min="0" max="1" step="0.05">
    <input type="color" id="linerColor">
  </div>
  <label>目尻ハネの長さ（0でなし） <input type="range" id="linerWing" min="0" max="1" step="0.05"></label>
  <label>ハネの角度（下向き ⇔ 上向き） <input type="range" id="linerWingUp" min="-60" max="60" step="1"></label>
  <label>ハネの太さ（細 ⇔ 太） <input type="range" id="linerWingW" min="0.5" max="3" step="0.1"></label>
  <div class="note">設定は即時反映。映像・顔データは全てローカル処理。</div>
  <script src="popup.js"></script>
</body>
</html>
